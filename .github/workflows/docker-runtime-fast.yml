name: Build Hermes Runtime Fast

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  RUNTIME_IMAGE: ghcr.io/epicevent/hermes-runtime

jobs:
  build-runtime-fast:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build fast runtime image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.runtime
          platforms: linux/arm64
          load: true
          tags: ${{ env.RUNTIME_IMAGE }}:dev-${{ github.sha }}
          build-args: |
            HERMES_WORKSPACE_GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test fast runtime image
        run: bash scripts/runtime-image-smoke.sh "${{ env.RUNTIME_IMAGE }}:dev-${{ github.sha }}"

      - name: Push fast runtime image
        run: docker push "${{ env.RUNTIME_IMAGE }}:dev-${{ github.sha }}"

      - name: Show fast runtime digest
        run: docker buildx imagetools inspect "${{ env.RUNTIME_IMAGE }}:dev-${{ github.sha }}"
